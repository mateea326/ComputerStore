# Test Profile Properties
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable external dependencies during tests
spring.cloud.config.enabled=false
eureka.client.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
spring.cache.type=none

# JWT Test Secret
jwt.secret=413F4428472B4B6250655368566D5970337336763979244226452948404D6351
jwt.expirationMs=86400000
jwt.cookieName=jwt

# Disable Resilience4j circuit breakers in tests - otherwise they trip open during unit test fallback testing
# and then break integration tests that follow
management.health.circuitbreakers.enabled=false
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=false

# Set very high thresholds so circuit breakers never open during tests
resilience4j.circuitbreaker.configs.default.slidingWindowSize=100
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=100
resilience4j.circuitbreaker.configs.default.failureRateThreshold=100
resilience4j.circuitbreaker.instances.orderService.slidingWindowSize=100
resilience4j.circuitbreaker.instances.orderService.minimumNumberOfCalls=100
resilience4j.circuitbreaker.instances.orderService.failureRateThreshold=100
resilience4j.circuitbreaker.instances.userService.slidingWindowSize=100
resilience4j.circuitbreaker.instances.userService.minimumNumberOfCalls=100
resilience4j.circuitbreaker.instances.userService.failureRateThreshold=100

# Disable retries in tests to avoid slow test execution
resilience4j.retry.instances.orderService.maxAttempts=1
resilience4j.retry.instances.userService.maxAttempts=1
