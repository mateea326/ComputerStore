# Test Profile Properties
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable external dependencies during tests
spring.cloud.config.enabled=false
eureka.client.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
spring.cache.type=none

# JWT Test Secret
jwt.secret=413F4428472B4B6250655368566D5970337336763979244226452948404D6351
jwt.expirationMs=86400000
jwt.cookieName=jwt

# Disable Resilience4j metrics in tests to avoid exceptions
management.health.circuitbreakers.enabled=false
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=false
