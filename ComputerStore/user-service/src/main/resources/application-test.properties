# =============================================
# Profilul TEST - H2 In-Memory
# =============================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true

logging.level.com.example.ComputerStore=DEBUG

# Disable Spring Cloud Config Client and Eureka Client in tests
spring.cloud.config.enabled=false
eureka.client.enabled=false

# JWT Properties for Testing
jwt.secret=413F4428472B4B6250655368566D5970337336763979244226452948404D6351
jwt.expirationMs=86400000
jwt.cookieName=jwt

