# =============================================
# Profilul DEV - PostgreSQL
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/computer_store?currentSchema=computer_store
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.pool-name=ComputerHikariCP

logging.level.org.springframework.jdbc.datasource=DEBUG
logging.level.com.example.ComputerStore=DEBUG
