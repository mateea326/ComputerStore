<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Computer Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Georgia", serif;
            background: linear-gradient(100deg, #9cd5d1 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #7bb8b4;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #7bb8b4;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #619e9a;
        }
        .error {
            background: #fee;
            color: #dc3580;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #dc3580;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .login-link a {
            color: #7bb8b4;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .field-error {
            color: #dc3545;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
        input.invalid {
            border-color: #dc3545;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Create an account</h1>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form method="post" th:action="@{/register}" id="registerForm">
        <div class="form-group">
            <label for="firstName">First Name *</label>
            <input type="text" id="firstName" name="firstName" required maxlength="50">
            <div class="field-error" id="firstNameError">First name is required</div>
        </div>

        <div class="form-group">
            <label for="lastName">Last Name *</label>
            <input type="text" id="lastName" name="lastName" required maxlength="50">
            <div class="field-error" id="lastNameError">Last name is required</div>
        </div>

        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required maxlength="50">
            <div class="field-error" id="emailError">Please enter a valid email</div>
        </div>

        <div class="form-group">
            <label for="phoneNumber">Phone Number *</label>
            <input type="tel" id="phoneNumber" name="phoneNumber" required maxlength="20">
            <div class="field-error" id="phoneError">Phone number should contain only digits</div>
        </div>

        <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" name="address" required>
        </div>

        <div class="form-group">
            <label for="username">Username *</label>
            <input type="text" id="username" name="username" required maxlength="30">
            <div class="field-error" id="usernameError">Username is required</div>
        </div>

        <div class="form-group">
            <label for="password">Password (min 8 characters) *</label>
            <input type="password" id="password" name="password" minlength="8" required>
            <div class="field-error" id="passwordError">Password must be at least 8 characters</div>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirm Password *</label>
            <input type="password" id="confirmPassword" name="confirmPassword" minlength="8" required>
            <div class="field-error" id="confirmError">Passwords do not match</div>
        </div>

        <button type="submit">Register</button>
    </form>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            var valid = true;
            document.querySelectorAll('.field-error').forEach(function(el) { el.style.display = 'none'; });
            document.querySelectorAll('input').forEach(function(el) { el.classList.remove('invalid'); });

            var email = document.getElementById('email');
            var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email.value)) {
                showError('email', 'emailError'); valid = false;
            }

            var phone = document.getElementById('phoneNumber');
            if (!/^\d+$/.test(phone.value)) {
                showError('phoneNumber', 'phoneError'); valid = false;
            }

            var password = document.getElementById('password');
            if (password.value.length < 8) {
                showError('password', 'passwordError'); valid = false;
            }

            var confirm = document.getElementById('confirmPassword');
            if (password.value !== confirm.value) {
                showError('confirmPassword', 'confirmError'); valid = false;
            }

            if (!valid) e.preventDefault();
        });

        function showError(inputId, errorId) {
            document.getElementById(inputId).classList.add('invalid');
            document.getElementById(errorId).style.display = 'block';
        }
    </script>

    <div class="login-link">
        Already have an account? <a href="/login">Login here</a>
    </div>
</div>
</body>
</html>
