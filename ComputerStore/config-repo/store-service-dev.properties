server.port=8081
server.forward-headers-strategy=FRAMEWORK

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/computer_store?currentSchema=computer_store}
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.pool-name=StoreHikariCP

logging.level.org.springframework.jdbc.datasource=DEBUG
logging.level.com.example.ComputerStore=DEBUG
logging.level.org.springframework.security=DEBUG

# Enable all actuator endpoints for config client refresh
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.circuitbreakers.enabled=true
management.health.diskspace.enabled=true


# Info endpoint — informatii despre serviciu
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
info.app.name=Store Service
info.app.description=Computer Store - Business Logic Service
info.app.version=1.0.0
info.app.encoding=UTF-8

# JWT Configuration
jwt.secret=413F4428472B4B6250655368566D5970337336763979244226452948404D6351
jwt.expirationMs=86400000
jwt.cookieName=jwt

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10

# ===============================
# Redis / Cache Configuration
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===== Resilience4j Circuit Breaker Configuration =====

# Circuit Breaker pentru user-service (apeluri Feign)
resilience4j.circuitbreaker.instances.userService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.userService.sliding-window-size=5
resilience4j.circuitbreaker.instances.userService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.userService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.userService.automatic-transition-from-open-to-half-open-enabled=false
resilience4j.circuitbreaker.instances.userService.register-health-indicator=true
resilience4j.circuitbreaker.instances.userService.ignore-exceptions=com.example.ComputerStore.exception.DuplicateResourceException,com.example.ComputerStore.exception.ResourceNotFoundException,java.lang.IllegalArgumentException

# Circuit Breaker pentru orderService
resilience4j.circuitbreaker.instances.orderService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.orderService.sliding-window-size=5
resilience4j.circuitbreaker.instances.orderService.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.orderService.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.orderService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.orderService.automatic-transition-from-open-to-half-open-enabled=false
resilience4j.circuitbreaker.instances.orderService.register-health-indicator=true

# Timeout Configuration (TimeLimit)
resilience4j.timelimiter.instances.userService.timeout-duration=3s
resilience4j.timelimiter.instances.orderService.timeout-duration=5s

# Retry Configuration
resilience4j.retry.instances.userService.max-attempts=3
resilience4j.retry.instances.userService.wait-duration=500ms
