server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/computer_store?currentSchema=computer_store
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.pool-name=UserHikariCP

logging.level.org.springframework.jdbc.datasource=DEBUG
logging.level.com.example.ComputerStore=DEBUG

# Enable all actuator endpoints for config client refresh
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.diskspace.enabled=true

# Prometheus Metrics Export
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=user-service
management.metrics.tags.environment=dev

# Distributed Tracing — Zipkin (BONUS)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Info endpoint — informatii despre serviciu
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
info.app.name=User Service
info.app.description=Computer Store - User Management Service
info.app.version=1.0.0
info.app.encoding=UTF-8

# JWT Configuration
jwt.secret=413F4428472B4B6250655368566D5970337336763979244226452948404D6351
jwt.expirationMs=86400000
jwt.cookieName=jwt

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10
