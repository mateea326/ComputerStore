# ===================================================
# API Gateway — Dev Profile Configuration
# Port: 8443 (HTTPS entry point)
# ===================================================

server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:gateway-keystore.jks
server.ssl.key-store-password=secret
server.ssl.key-password=secret
server.ssl.key-store-type=JKS

# ===== Eureka Client =====
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===== Actuator — toate endpoint-urile expuse =====
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=api-gateway

# ===== Prometheus Metrics =====
management.prometheus.metrics.export.enabled=true

# ===== Distributed Tracing — Zipkin =====
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# ===== Spring Cloud Gateway Routes =====
# Routing centralizat: toate requesturile vin pe :8080 și sunt rutate la servicii

spring.cloud.gateway.routes[0].id=store-service-route
spring.cloud.gateway.routes[0].uri=lb://store-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/store/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/store/(?<segment>.*), /${segment}
spring.cloud.gateway.routes[0].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[0].filters[1].args.key-resolver=#{@ipKeyResolver}
spring.cloud.gateway.routes[0].filters[1].args.redis-rate-limiter.replenishRate=20
spring.cloud.gateway.routes[0].filters[1].args.redis-rate-limiter.burstCapacity=40
spring.cloud.gateway.routes[0].filters[1].args.redis-rate-limiter.requestedTokens=1

spring.cloud.gateway.routes[1].id=user-service-route
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/user/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/user/(?<segment>.*), /${segment}
spring.cloud.gateway.routes[1].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[1].args.key-resolver=#{@ipKeyResolver}
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.replenishRate=10
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.requestedTokens=1

spring.cloud.gateway.routes[2].id=store-service-actuator-route
spring.cloud.gateway.routes[2].uri=lb://store-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/store/actuator/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/store/actuator/(?<segment>.*), /actuator/${segment}

spring.cloud.gateway.routes[3].id=user-service-actuator-route
spring.cloud.gateway.routes[3].uri=lb://user-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/user/actuator/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/user/actuator/(?<segment>.*), /actuator/${segment}

# ===== Global CORS (prin gateway) =====
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].exposedHeaders=X-Response-Time,X-Processed-By,X-Request-Id
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true

# ===== Rate Limiter — folosim implementarea in-memory (fara Redis) =====
# Dezactivăm Redis required pentru rate limiter (fallback la no-op limiter fara Redis)
spring.cloud.gateway.filter.request-rate-limiter.deny-empty-key=false
spring.cloud.gateway.filter.request-rate-limiter.empty-key-status-code=429

# ===== Logging =====
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.example.apigateway=DEBUG
logging.level.reactor.netty=INFO
